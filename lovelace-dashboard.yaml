# drop the contents of this file into your Home Assistant Dashboard.
# Go to:
# ... > Edit Dashboard > ... > Raw Configuration Editor

type: sections
path: console-fan
max_columns: 4
title: console fan
icon: mdi:fan
sections:
  - type: grid
    cards:
      - type: conditional
        conditions:
          - condition: state
            entity: fan.esphome_web_f9cc94_manual_fan_speed
            state_not: "on"
        card:
          type: vertical-stack
          cards:
            - type: entities
              title: Thermostat Fan (PID)
              entities:
                - entity: climate.esphome_web_f9cc94_console_fan_thermostat
            - type: vertical-stack
              cards:
                - show_name: true
                  show_icon: true
                  show_state: true
                  type: glance
                  entities:
                    - entity: sensor.esphome_web_f9cc94_is_in_deadband
                      name: in_deadband?
                    - entity: sensor.esphome_web_f9cc94_error_value
                      name: error
                      icon: mdi:equal
                  state_color: false
                - type: glance
                  show_icon: false
                  entities:
                    - entity: sensor.esphome_web_f9cc94_output_value
                      name: output
                    - entity: sensor.esphome_web_f9cc94_p_term
                      name: p_term
                    - entity: sensor.esphome_web_f9cc94_i_term
                      name: i_term
                    - entity: sensor.esphome_web_f9cc94_d_term
                      name: d_term
      - type: entities
        entities:
          - entity: fan.esphome_web_f9cc94_manual_fan_speed
          - entity: sensor.esphome_web_f9cc94_fan_speed_pwm_voltage
          - entity: sensor.esphome_web_f9cc94_fan_speed_1
      - type: entities
        entities:
          - entity: sensor.esphome_web_f9cc94_ip_address
          - entity: sensor.esphome_web_f9cc94_wifi_strength
          - entity: sensor.esphome_web_f9cc94_uptime
          - entity: sensor.esphome_web_f9cc94_temperature
          - entity: sensor.esphome_web_f9cc94_humidity
          - entity: switch.esphome_web_f9cc94_restart
  - type: grid
    cards:
      - type: vertical-stack
        cards:
          - type: history-graph
            entities:
              - entity: sensor.esphome_web_f9cc94_fan_speed_pwm_voltage
            refresh_interval: 0
            hours_to_show: 3
            title: 3 hr
          - type: history-graph
            entities:
              - entity: climate.esphome_web_f9cc94_console_fan_thermostat
                name: " "
            refresh_interval: 0
            hours_to_show: 3
  - type: grid
    cards:
      - type: conditional
        conditions:
          - condition: state
            entity: fan.esphome_web_f9cc94_manual_fan_speed
            state_not: "on"
        card:
          type: vertical-stack
          cards:
            - type: entities
              entities:
                - entity: number.esphome_web_f9cc94_kp
                - entity: number.esphome_web_f9cc94_ki
                - entity: number.esphome_web_f9cc94_kd
                - entity: button.esphome_web_f9cc94_pid_climate_autotune
              title: PID Controls Setup
            - type: entities
              entities:
                - entity: number.esphome_web_f9cc94_deadband_threshold_high
                  name: Threshold High
                - entity: number.esphome_web_f9cc94_deadband_threshold_low
                  name: Threshold Low
                - entity: number.esphome_web_f9cc94_deadband_ki_multiplier
                  name: ki multiplier
              title: Deadband Parameters
cards: []
visible:
  - user: 86d5b4e471ca424c9e8ae3b5452e189b
  - user: 869d2c749701408dbc337b3903a09bac
